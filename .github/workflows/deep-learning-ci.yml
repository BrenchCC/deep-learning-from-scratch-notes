name: Test and Build deep_learning Package

on:
  push:
    branches: [main]
    paths:
      - "deep_learning/**"
      - ".github/workflows/deep-learning-ci.yml"
  pull_request:
    paths:
      - "deep_learning/**"
      - ".github/workflows/deep-learning-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deep_learning-ci-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Format check with ruff
        uses: astral-sh/ruff-action@v4.0.0
        with:
          args: format --check --diff
          src: >-
            deep_learning/deep_learning
            deep_learning/deep_learning/tests

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "./deep_learning[test]"
          pip install build

      - name: Test deep_learning package
        run: python -m pytest deep_learning/deep_learning/tests

      - name: Build deep_learning package
        run: python -m build --outdir dist ./deep_learning

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: deep_learning-package-py310
          path: dist/*
          if-no-files-found: error
