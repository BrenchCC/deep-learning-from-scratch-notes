meta:
  name: Deep-Learning-From-Scratch-Notes
  link:
    home: https://github.com/BrenchCC/deep-learning-from-scratch-notes
    github: https://github.com/BrenchCC/deep-learning-from-scratch-notes

logo:
  small: assets/favicon.svg
  medium: assets/favicon.svg

color:
  palette:
    ink: "#18212f"
    paper: "#fbfbf8"
    white: "#ffffff"
    line: "#d9dfdf"
    slate: "#576474"
    blue: "#245b8f"
    green: "#27735f"
    red: "#9f3a38"
    amber: "#b7791f"
  foreground: ink
  background: paper
  primary: blue
  secondary: green
  tertiary: line
  info: slate
  warning: amber
  danger: red
  light: white
  dark: ink
  link: blue

typography:
  fonts:
    - family: Source Serif 4
      source: google
    - family: IBM Plex Sans
      source: google
    - family: JetBrains Mono
      source: google
  base:
    family: Source Serif 4
    line-height: 1.68
  headings:
    family: IBM Plex Sans
    weight: 600
    color: ink
  monospace:
    family: JetBrains Mono
    size: 0.92em
  link:
    color: link
    decoration: underline
